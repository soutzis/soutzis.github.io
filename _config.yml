title: We find it first.
tagline: Cyber Security Consulting Services
description: >-
  Independent cyber security consultancy based in Cyprus. Penetration testing, API security reviews,
  Security Awareness trainings, Attack Surface Mapping, and more.
url: "https://cyber-security.com.cy"
baseurl: ""
lang: en

author:
  name: Petros Soutzis
  email: psoutzis@cyber-security.com.cy

# Social / contact
links:
  github: "https://github.com/soutzis"
  linkedin: "https://www.linkedin.com/in/petrossoutzis/"
  email: "info@cyber-security.com.cy"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Blog posts live under /blog/:title/
permalink: /blog/:title/

# Default front matter
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
    values:
      layout: page

sass:
  style: compressed

exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - vendor
  - .idea
